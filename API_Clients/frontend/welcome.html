<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bienvenue chez PayeTonKawa</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background-color: white;
            padding: 40px 60px;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .card h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .card p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }

        .btn {
            background-color: #8B4513;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #A0522D;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Bienvenue chez PayeTonKawa ☕</h1>
        <p>Nous sommes spécialisés dans l'importation et la vente de café de qualité en France, aussi bien pour les
            particuliers que pour les professionnels de la restauration.</p>

        <!-- Bouton vers index.html -->
        <a href="index.html" class="btn">Accès à votre espace client</a>
    </div>

</body>

</html>
